name: Registry Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate registry
        run: npm run validate

      - name: Check for initialized submodules
        run: |
          if [ -d "extensions" ] && [ "$(find extensions -mindepth 1 -maxdepth 1 -type d | wc -l)" -gt 0 ]; then
            echo "Error: Submodule directories found in extensions/"
            echo "These should not be initialized in the registry repository."
            find extensions -mindepth 1 -maxdepth 1 -type d
            exit 1
          fi
